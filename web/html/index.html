<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r3-UI - Xray Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            text-align: center;
            font-size: 32px;
            color: #1890ff;
            margin-bottom: 8px;
        }
        .login-subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.1);
        }
        .form-group input::placeholder {
            color: #bbb;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #40a9ff;
        }
        .btn-login:active {
            background: #096dd9;
        }
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-msg {
            color: #ff4d4f;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }
        .hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
        .dashboard {
            display: none;
            min-height: 100vh;
            background: #f0f2f5;
        }
        .sidebar {
            width: 220px;
            background: #001529;
            color: white;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }
        .sidebar-header {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-menu {
            list-style: none;
            padding: 10px 0;
        }
        .sidebar-menu li {
            padding: 14px 24px;
            cursor: pointer;
            color: rgba(255,255,255,0.65);
        }
        .sidebar-menu li:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }
        .sidebar-menu li.active {
            background: #1890ff;
            color: white;
        }
        .main-content {
            margin-left: 220px;
            padding: 24px;
            flex: 1;
        }
        .page-header {
            margin-bottom: 24px;
        }
        .page-header h2 {
            font-size: 22px;
            color: #333;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card h3 {
            font-size: 28px;
            color: #333;
        }
        .stat-card p {
            color: #999;
            margin-top: 4px;
        }
        .data-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            background: #fafafa;
            font-weight: 500;
        }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .tag.green { background: #f6ffed; color: #52c41a; }
        .tag.red { background: #fff2f0; color: #ff4d4f; }
        .tag.blue { background: #e6f7ff; color: #1890ff; }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #1890ff; color: white; }
        .btn-danger { background: #ff4d4f; color: white; }
        .btn-small { padding: 4px 8px; font-size: 12px; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-box" id="loginPage">
        <h1 class="login-title">r3-UI</h1>
        <p class="login-subtitle">Xray Proxy Panel - Rust Edition</p>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        </form>
        <p class="error-msg" id="errorMsg"></p>
        <p class="hint">Default: admin / admin</p>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">⚡ r3-UI</div>
            <ul class="sidebar-menu">
                <li class="active" onclick="showPage('status')">📊 Dashboard</li>
                <li onclick="showPage('inbounds')">🔌 Inbounds</li>
                <li onclick="showPage('settings')">⚙️ Settings</li>
                <li onclick="handleLogout()">🚪 Logout</li>
            </ul>
        </div>
        <div class="main-content">
            <!-- Status Page -->
            <div id="statusPage">
                <div class="page-header"><h2>Dashboard</h2></div>
                <div class="card-grid">
                    <div class="stat-card">
                        <h3 id="xrayStatus">-</h3>
                        <p>Xray Status</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="inboundCount">0</h3>
                        <p>Total Inbounds</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="totalTraffic">0 B</h3>
                        <p>Total Traffic</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="activeCount">0</h3>
                        <p>Active Inbounds</p>
                    </div>
                </div>
                <div class="data-card">
                    <h3 style="margin-bottom: 16px;">Actions</h3>
                    <button class="btn btn-primary" onclick="restartXray()">Restart Xray</button>
                    <button class="btn" onclick="loadData()" style="margin-left: 8px;">🔄 Refresh</button>
                </div>
            </div>

            <!-- Inbounds Page -->
            <div id="inboundsPage" style="display: none;">
                <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Inbounds</h2>
                    <button class="btn btn-primary" onclick="showAddModal()">➕ Add Inbound</button>
                </div>
                <div class="data-card">
                    <table id="inboundsTable">
                        <thead>
                            <tr><th>ID</th><th>Remark</th><th>Protocol</th><th>Port</th><th>Status</th><th>Traffic</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="inboundsBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Settings Page -->
            <div id="settingsPage" style="display: none;">
                <div class="page-header"><h2>Settings</h2></div>
                <div class="data-card">
                    <div class="form-group">
                        <label>Web Port</label>
                        <input type="number" id="settingPort" value="2053">
                    </div>
                    <div class="form-group">
                        <label>Subscription Token</label>
                        <input type="text" id="settingToken" placeholder="Enter token">
                    </div>
                    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        let inbounds = [];

        async function checkAuth() {
            try {
                const res = await fetch('/api/is_logged');
                const data = await res.json();
                isLoggedIn = data.success && data.data;
                if (isLoggedIn) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    loadData();
                }
            } catch (e) {
                console.error('Auth check failed', e);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            error.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    isLoggedIn = true;
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    loadData();
                } else {
                    error.textContent = data.message || 'Login failed';
                    error.style.display = 'block';
                }
            } catch (e) {
                error.textContent = 'Connection error';
                error.style.display = 'block';
            }
            btn.disabled = false;
            btn.textContent = 'Sign In';
            return false;
        }

        async function handleLogout() {
            await fetch('/api/logout', { method: 'POST' });
            isLoggedIn = false;
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        function showPage(page) {
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('statusPage').style.display = page === 'status' ? 'block' : 'none';
            document.getElementById('inboundsPage').style.display = page === 'inbounds' ? 'block' : 'none';
            document.getElementById('settingsPage').style.display = page === 'settings' ? 'block' : 'none';
        }

        function formatBytes(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function loadData() {
            try {
                const [inbRes, xrayRes] = await Promise.all([
                    fetch('/api/panel/api/inbounds'),
                    fetch('/api/panel/api/xray/status')
                ]);
                const inbData = await inbRes.json();
                const xrayData = await xrayRes.json();

                inbounds = inbData.data || [];
                const status = xrayData.data || {};

                document.getElementById('xrayStatus').textContent = status.running ? 'Running' : 'Stopped';
                document.getElementById('inboundCount').textContent = inbounds.length;
                document.getElementById('activeCount').textContent = inbounds.filter(i => i.enable).length;
                document.getElementById('totalTraffic').textContent = formatBytes(
                    inbounds.reduce((s, i) => s + (i.up || 0) + (i.down || 0), 0)
                );

                renderInbounds();
            } catch (e) {
                console.error('Failed to load data', e);
            }
        }

        function renderInbounds() {
            const tbody = document.getElementById('inboundsBody');
            if (inbounds.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">No inbounds</td></tr>';
                return;
            }
            tbody.innerHTML = inbounds.map(i => `
                <tr>
                    <td>${i.id}</td>
                    <td>${i.remark || '-'}</td>
                    <td><span class="tag blue">${i.protocol}</span></td>
                    <td>${i.port}</td>
                    <td><span class="tag ${i.enable ? 'green' : 'red'}">${i.enable ? 'Enabled' : 'Disabled'}</span></td>
                    <td>${formatBytes((i.up || 0) + (i.down || 0))}</td>
                    <td>
                        <button class="btn btn-small" onclick="deleteInbound(${i.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function restartXray() {
            try {
                await fetch('/api/panel/api/xray/restart', { method: 'POST' });
                alert('Xray restarted');
                loadData();
            } catch (e) {
                alert('Failed to restart');
            }
        }

        async function deleteInbound(id) {
            if (!confirm('Delete this inbound?')) return;
            try {
                await fetch(`/api/panel/api/inbounds/del/${id}`, { method: 'POST' });
                loadData();
            } catch (e) {
                alert('Failed to delete');
            }
        }

        function showAddModal() {
            const remark = prompt('Enter remark:');
            if (!remark) return;
            const port = prompt('Enter port:', '443');
            const protocol = prompt('Enter protocol (vmess/vless/trojan):', 'vmess');

            fetch('/api/panel/api/inbounds', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ remark, port: parseInt(port), protocol, enable: true })
            }).then(() => loadData()).catch(() => alert('Failed to create'));
        }

        async function saveSettings() {
            const port = document.getElementById('settingPort').value;
            const token = document.getElementById('settingToken').value;
            try {
                await fetch('/api/panel/api/setting/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: 'webPort', value: port })
                });
                await fetch('/api/panel/api/setting/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: 'subToken', value: token })
                });
                alert('Settings saved');
            } catch (e) {
                alert('Failed to save');
            }
        }

        // Check auth on load
        checkAuth();
    </script>
</body>
</html>
